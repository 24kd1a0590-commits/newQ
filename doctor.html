<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIQ | Doctor Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: #0f172a;
}

/* Glass */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
}

/* Tabs */
.tab {
  cursor: pointer;
}
.active-tab {
  background: #4f46e5;
}
</style>

</head>

<body class="text-white min-h-screen">

<!-- 🔝 Navbar -->
<div class="flex justify-between items-center px-6 py-4 bg-gray-900 shadow">
  <h1 class="text-2xl font-bold text-indigo-400">MEDIQ Doctor Panel</h1>
  <div>
    <span id="welcome" class="mr-4"></span>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>
</div>

<!-- 🔷 Tabs -->
<div class="flex gap-4 p-4 bg-gray-800">
  <div class="tab active-tab px-4 py-2 rounded" onclick="showTab('dashboard')">Dashboard</div>
  <div class="tab px-4 py-2 rounded bg-gray-700" onclick="showTab('queue')">Queue</div>
  <div class="tab px-4 py-2 rounded bg-gray-700" onclick="showTab('analytics')">Analytics</div>
  <div class="tab px-4 py-2 rounded bg-gray-700" onclick="showTab('ai')">AI Insights</div>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" class="p-6">

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="glass p-5 rounded-xl bg-blue-500/20">
      <h2>Total Patients</h2>
      <p id="totalPatients" class="text-3xl font-bold">0</p>
    </div>

    <div class="glass p-5 rounded-xl bg-green-500/20">
      <h2>Appointments</h2>
      <p id="appointments" class="text-3xl font-bold">0</p>
    </div>

    <div class="glass p-5 rounded-xl bg-yellow-500/20">
      <h2>Waiting</h2>
      <p id="waitingCount" class="text-3xl font-bold">0</p>
    </div>

  </div>

</div>

<!-- 📋 QUEUE -->
<div id="queue" class="p-6 hidden">

  <div class="glass p-6 rounded-xl">
    <h2 class="mb-4 text-xl">Live Queue</h2>

    <table class="w-full">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Issue</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="queueTable"></tbody>
    </table>

  </div>

</div>

<!-- 📊 ANALYTICS -->
<div id="analytics" class="p-6 hidden">
  <div class="glass p-6 rounded-xl">
    <h2 class="mb-4">Patient Load</h2>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- 🧠 AI -->
<div id="ai" class="p-6 hidden">
  <div class="glass p-6 rounded-xl bg-purple-500/20">
    <h2 class="mb-4">AI Suggestions</h2>
    <p id="suggestion">Analyzing...</p>
  </div>
</div>

<!-- 🔔 Notification -->
<div id="notification" class="fixed top-5 right-5 bg-green-500 px-4 py-2 rounded hidden">
  New patient added!
</div>

<script>
// Role protection
if (localStorage.getItem("role") !== "doctor") {
  window.location.href = "index.html";
}

// Welcome
document.getElementById("welcome").innerText =
  "Dr. " + localStorage.getItem("username");

// Tabs
function showTab(tab) {
  document.querySelectorAll("#dashboard,#queue,#analytics,#ai")
    .forEach(el => el.classList.add("hidden"));

  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active-tab"));
  event.target.classList.add("active-tab");
}

// Queue data
let queue = [
  {name:"Ravi", issue:"Fever", status:"Waiting"},
  {name:"Anjali", issue:"Cold", status:"In Progress"}
];

// Render Queue
function renderQueue() {
  const table = document.getElementById("queueTable");
  table.innerHTML = "";

  queue.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.issue}</td>
        <td>${p.status}</td>
      </tr>
    `;
  });

  document.getElementById("totalPatients").innerText = queue.length;
  document.getElementById("appointments").innerText = queue.length;
  document.getElementById("waitingCount").innerText =
    queue.filter(p => p.status==="Waiting").length;
}

// Notification
function notify() {
  const n = document.getElementById("notification");
  n.classList.remove("hidden");
  setTimeout(()=>n.classList.add("hidden"),2000);
}

// Simulate updates
setInterval(()=>{
  const names = ["Kiran","Sneha","Rahul"];
  const issues = ["Checkup","Fever","Headache"];

  queue.push({
    name: names[Math.floor(Math.random()*3)],
    issue: issues[Math.floor(Math.random()*3)],
    status: "Waiting"
  });

  notify();
  renderQueue();
}, 8000);

// Chart
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ['9AM','10AM','11AM','12PM','1PM'],
    datasets: [{
      label: 'Patients',
      data: [2,5,8,6,10]
    }]
  }
});

// AI Suggestion
setInterval(()=>{
  const waiting = queue.filter(p => p.status==="Waiting").length;

  document.getElementById("suggestion").innerText =
    waiting > 5
    ? "⚠ High load! Speed up consultations."
    : "✅ Smooth workflow.";
}, 3000);

// Logout
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// Init
renderQueue();
</script>

</body>
</html>
