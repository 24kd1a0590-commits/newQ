<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIQ | Doctor Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(to right, #1e3a8a, #4f46e5);
}

/* Glass card */
.glass {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* Status colors */
.waiting { background: #facc15; }
.progress { background: #3b82f6; }
.done { background: #22c55e; }
</style>

</head>

<body class="text-white min-h-screen p-6">

<!-- Top Bar -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-bold">Doctor Dashboard</h1>
  <div>
    <span id="welcome" class="mr-4"></span>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>
</div>

<!-- Stats -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

  <div class="glass p-5 rounded-xl">
    <h2 class="text-lg">Total Patients</h2>
    <p class="text-3xl font-bold">24</p>
  </div>

  <div class="glass p-5 rounded-xl">
    <h2 class="text-lg">Appointments Today</h2>
    <p class="text-3xl font-bold">12</p>
  </div>

  <div class="glass p-5 rounded-xl">
    <h2 class="text-lg">Waiting Queue</h2>
    <p class="text-3xl font-bold">5</p>
  </div>

</div>

<!-- Patient Queue -->
<div class="glass p-6 rounded-xl">
  <h2 class="text-xl font-semibold mb-4">Live Patient Queue</h2>

  <table class="w-full text-left">
    <thead>
      <tr class="border-b border-white/30">
        <th class="py-2">Name</th>
        <th>Issue</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>

      <tr class="border-b border-white/20">
        <td class="py-2">Ravi Kumar</td>
        <td>Fever</td>
        <td><span class="waiting px-2 py-1 rounded text-black">Waiting</span></td>
        <td>
          <button class="bg-blue-500 px-3 py-1 rounded">Start</button>
        </td>
      </tr>

      <tr class="border-b border-white/20">
        <td class="py-2">Anjali</td>
        <td>Headache</td>
        <td><span class="progress px-2 py-1 rounded">In Progress</span></td>
        <td>
          <button class="bg-green-500 px-3 py-1 rounded">Finish</button>
        </td>
      </tr>

      <tr>
        <td class="py-2">Rahul</td>
        <td>Checkup</td>
        <td><span class="done px-2 py-1 rounded">Done</span></td>
        <td>-</td>
      </tr>

    </tbody>
  </table>
</div>

<script>
// Role protection
const role = localStorage.getItem("role");
if (role !== "doctor") {
  alert("Access denied");
  window.location.href = "index.html";
}

// Welcome message
document.getElementById("welcome").innerText =
  "Dr. " + localStorage.getItem("username");

// Logout
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
