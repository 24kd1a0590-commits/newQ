<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBook | Patient Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                    <i data-lucide="activity"></i> HealthBook
                </h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" onclick="showPage('home')" class="flex items-center gap-3 p-3 text-blue-600 bg-blue-50 rounded-lg font-medium">
                    <i data-lucide="home"></i> Home
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i data-lucide="search"></i> Search
                </a>
                <a href="#" onclick="showPage('status')" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i data-lucide="calendar-check"></i> Booking Status
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                    <i data-lucide="user"></i> Profile
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3 p-2">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold">JD</div>
                    <div>
                        <p class="text-sm font-semibold">John Doe</p>
                        <p class="text-xs text-gray-500">Patient ID: #4412</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-gray-50">
            
            <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 sticky top-0 z-10">
                <div class="relative w-full max-w-xl">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input type="text" placeholder="Search doctors, specialties, or clinics..." 
                        class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                
                <section id="home-page" class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                    
                    <div class="mb-8 flex flex-wrap gap-4 items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-2 text-sm text-gray-600">
                            <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>
                            <span class="font-semibold">Filters:</span>
                        </div>
                        <select class="bg-gray-50 border border-gray-200 rounded-md px-3 py-1.5 text-sm outline-none">
                            <option>Location (All)</option>
                            <option>Downtown</option>
                            <option>Suburbs</option>
                        </select>
                        <select class="bg-gray-50 border border-gray-200 rounded-md px-3 py-1.5 text-sm outline-none">
                            <option>Rating (4.0+)</option>
                            <option>5.0 Only</option>
                        </select>
                        <select class="bg-gray-50 border border-gray-200 rounded-md px-3 py-1.5 text-sm outline-none">
                            <option>Fee: Low to High</option>
                            <option>Fee: High to Low</option>
                        </select>
                        <select class="bg-gray-50 border border-gray-200 rounded-md px-3 py-1.5 text-sm outline-none">
                            <option>Crowd: Low</option>
                            <option>Crowd: Medium</option>
                        </select>
                    </div>

                    <h2 class="text-xl font-bold mb-6">Available Doctors</h2>
                    <div id="doctor-grid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                        </div>
                </section>

                <section id="status-page" class="hidden flex-1 p-8 overflow-y-auto">
                    <h2 class="text-2xl font-bold mb-6">My Bookings</h2>
                    <div id="bookings-list" class="space-y-4">
                        </div>
                </section>

                <aside id="booking-panel" class="w-96 bg-white border-l border-gray-200 p-6 hidden lg:block overflow-y-auto custom-scrollbar">
                    <div id="booking-content-empty" class="h-full flex flex-col items-center justify-center text-center text-gray-400">
                        <i data-lucide="calendar" class="w-12 h-12 mb-4 opacity-20"></i>
                        <p>Select a doctor to view <br>available time slots</p>
                    </div>

                    <div id="booking-content-active" class="hidden">
                        <h3 class="text-lg font-bold mb-4">Book Appointment</h3>
                        <div id="selected-doc-info" class="mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                            </div>

                        <label class="block text-sm font-semibold mb-3">Available Slots (Today)</label>
                        <div id="time-slots" class="grid grid-cols-3 gap-2 mb-8">
                            </div>

                        <div class="border-t border-gray-100 pt-6">
                            <h4 class="font-bold mb-2">Summary</h4>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-500">Consultation Fee</span>
                                <span id="summary-fee" class="font-semibold">$0.00</span>
                            </div>
                            <div class="flex justify-between text-sm mb-4">
                                <span class="text-gray-500">Service Tax</span>
                                <span class="font-semibold">$2.00</span>
                            </div>
                            <button onclick="confirmBooking()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition transform active:scale-95 shadow-lg shadow-blue-200">
                                Confirm Booking
                            </button>
                            <button onclick="closeBooking()" class="w-full mt-3 text-gray-500 py-2 font-medium hover:text-red-500 transition">
                                Cancel
                            </button>
                        </div>
                    </div>
                </aside>

            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-300 z-50">
        Booking confirmed successfully!
    </div>

    <script>
        // DUMMY DATA
        const doctors = [
            { id: 1, name: "Dr. Sarah Jenkins", spec: "Cardiologist", rating: 4.9, fee: 120, avail: "Available", crowd: "Low", gender: "Female", img: "SJ" },
            { id: 2, name: "Dr. Marcus Chen", spec: "Dermatologist", rating: 4.7, fee: 90, avail: "2 slots left", crowd: "High", gender: "Male", img: "MC" },
            { id: 3, name: "Dr. Alanna Reed", spec: "Pediatrician", rating: 4.8, fee: 100, avail: "Available", crowd: "Medium", gender: "Female", img: "AR" },
            { id: 4, name: "Dr. James Wilson", spec: "Neurologist", rating: 4.6, fee: 150, avail: "Available", crowd: "Low", gender: "Male", img: "JW" },
        ];

        const myBookings = [
            { id: 101, docName: "Dr. Sarah Jenkins", date: "Oct 24, 2023", time: "10:30 AM", status: "Completed" }
        ];

        let selectedDoctor = null;
        let selectedTime = null;

        // INITIALIZE
        function init() {
            renderDoctors();
            lucide.createIcons();
        }

        // RENDER DOCTOR CARDS
        function renderDoctors() {
            const grid = document.getElementById('doctor-grid');
            grid.innerHTML = doctors.map(doc => `
                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition group">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 font-bold text-lg">${doc.img}</div>
                        <span class="text-xs font-bold px-2 py-1 rounded-full ${doc.crowd === 'Low' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'}">
                            ${doc.crowd} Crowd
                        </span>
                    </div>
                    <h3 class="font-bold text-gray-900 group-hover:text-blue-600 transition">${doc.name}</h3>
                    <p class="text-sm text-gray-500 mb-3">${doc.spec}</p>
                    <div class="flex items-center gap-4 mb-5 text-sm">
                        <div class="flex items-center gap-1 text-yellow-500 font-bold">
                            <i data-lucide="star" class="w-4 h-4 fill-current"></i> ${doc.rating}
                        </div>
                        <div class="text-gray-400">|</div>
                        <div class="font-semibold">$${doc.fee}</div>
                    </div>
                    <button onclick="openBooking(${doc.id})" class="w-full py-2 bg-gray-50 text-blue-600 font-semibold rounded-lg hover:bg-blue-600 hover:text-white transition">
                        Book Now
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // NAVIGATION LOGIC
        function showPage(page) {
            const home = document.getElementById('home-page');
            const status = document.getElementById('status-page');
            if(page === 'home') {
                home.classList.remove('hidden');
                status.classList.add('hidden');
            } else {
                home.classList.add('hidden');
                status.classList.remove('hidden');
                renderBookings();
            }
        }

        // BOOKING LOGIC
        function openBooking(docId) {
            selectedDoctor = doctors.find(d => d.id === docId);
            document.getElementById('booking-content-empty').classList.add('hidden');
            const activePanel = document.getElementById('booking-content-active');
            activePanel.classList.remove('hidden');

            document.getElementById('selected-doc-info').innerHTML = `
                <p class="font-bold text-blue-800">${selectedDoctor.name}</p>
                <p class="text-xs text-blue-600">${selectedDoctor.spec}</p>
            `;
            document.getElementById('summary-fee').innerText = `$${selectedDoctor.fee}`;

            // Render Time Slots
            const times = ["09:00", "10:30", "13:00", "14:30", "16:00", "17:00"];
            const slotsDiv = document.getElementById('time-slots');
            slotsDiv.innerHTML = times.map(t => `
                <button onclick="selectTime('${t}', this)" class="slot-btn border border-gray-200 py-2 text-sm rounded-lg hover:border-blue-500 transition">
                    ${t}
                </button>
            `).join('');
        }

        function selectTime(time, el) {
            selectedTime = time;
            document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
            el.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
        }

        function confirmBooking() {
            if(!selectedTime) return alert("Please select a time slot first!");
            
            const newBooking = {
                id: Date.now(),
                docName: selectedDoctor.name,
                date: "Today",
                time: selectedTime,
                status: "Booked"
            };
            myBookings.unshift(newBooking);
            
            // Show Toast
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
            
            closeBooking();
        }

        function closeBooking() {
            document.getElementById('booking-content-active').classList.add('hidden');
            document.getElementById('booking-content-empty').classList.remove('hidden');
            selectedDoctor = null;
            selectedTime = null;
        }

        function renderBookings() {
            const list = document.getElementById('bookings-list');
            list.innerHTML = myBookings.map(b => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center"><i data-lucide="user" class="w-5 h-5"></i></div>
                        <div>
                            <p class="font-bold">${b.docName}</p>
                            <p class="text-sm text-gray-500">${b.date} • ${b.time}</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-bold ${b.status === 'Booked' ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}">
                        ${b.status}
                    </span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
