<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIQ | AI Healthcare</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: url('https://blog.voagents.ai/wp-content/uploads/2025/09/ai-medical-scheduling.png') no-repeat center center/cover;
  animation: zoomBg 20s infinite alternate ease-in-out;
}

@keyframes zoomBg {
  0% { background-size: 100%; }
  100% { background-size: 110%; }
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

.float {
  animation: float 4s ease-in-out infinite;
}

.glow {
  text-shadow: 0 0 10px rgba(59,130,246,0.8),
               0 0 20px rgba(59,130,246,0.6),
               0 0 30px rgba(59,130,246,0.4);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="overlay"></div>

<div class="relative w-96 bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.7)] p-8 float">

    <div class="absolute -inset-1 bg-gradient-to-r from-blue-500 to-indigo-600 blur opacity-30 rounded-2xl"></div>

    <div class="relative">

        <h1 class="text-4xl font-extrabold text-center glow mb-2">MEDIQ</h1>

        <p class="text-center text-gray-200 mb-6">AI Smart Healthcare System</p>

        <div class="bg-white/10 border border-white/20 rounded-lg p-3 mb-5 text-sm text-gray-200">
            🚀 Smart Scheduling <br>
            🤖 AI Doctor Matching <br>
            ⏱ Zero Waiting Time
        </div>

        <!-- NAME -->
        <input 
            type="text" 
            id="username" 
            placeholder="Enter your name"
            class="w-full px-4 py-2 mb-3 bg-white/20 border border-white/30 rounded-lg placeholder-gray-300"
        >

        <!-- EMAIL -->
        <input 
            type="email" 
            id="email" 
            placeholder="Enter your email"
            class="w-full px-4 py-2 mb-3 bg-white/20 border border-white/30 rounded-lg placeholder-gray-300"
        >

        <!-- PASSWORD -->
        <input 
            type="password" 
            id="password" 
            placeholder="Enter password"
            class="w-full px-4 py-2 mb-4 bg-white/20 border border-white/30 rounded-lg placeholder-gray-300"
        >

        <!-- ROLE -->
        <select 
            id="role"
            class="w-full px-4 py-2 mb-4 bg-white/20 border border-white/30 rounded-lg text-white"
        >
            <option value="patient" class="text-black">Patient</option>
            <option value="doctor" class="text-black">Doctor</option>
        </select>

        <!-- BUTTONS -->
        <button onclick="signup()" class="w-full bg-green-500 hover:bg-green-600 py-2 rounded-lg mb-2">
            Sign Up
        </button>
        <button onclick="login()" class="w-full bg-blue-500 py-2 rounded-lg">
  Login
</button>

    </div>
</div>

<script>
const supabaseUrl = 'https://gxuwfjlwcgnjnwegzamd.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dXdmamx3Y2duam53ZWd6YW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzcxNTYsImV4cCI6MjA5MDQ1MzE1Nn0.RPHbDA1YS6z6yTXST_IgKF4c9A9BkY8iqyo4WqfaYAA';

const { createClient } = supabase;

const supabaseClient = createClient(
  supabaseUrl,supabaseKey 
);

// SIGNUP
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const name = document.getElementById("username").value;
  const role = document.getElementById("role").value;

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  if (role === "doctor") {
    await supabaseClient.from('doctors').insert([{
      name: name,
      auth_id: user.id
    }]);
  } else {
    await supabaseClient.from('patients').insert([{
      name: name,
      auth_id: user.id
    }]);
  }

  alert("Signup successful!");
}
async function login() {
  console.log("Login clicked");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  const { data: doctorData } = await supabaseClient
    .from('doctors')
    .select('*')
    .eq('auth_id', user.id);

  if (doctorData.length > 0) {
    localStorage.setItem("role", "doctor");
    localStorage.setItem("doctor_id", doctorData[0].id);
    localStorage.setItem("username", doctorData[0].name);

    window.location.href = "doctor.html";
  } else {
    localStorage.setItem("role", "patient");
    localStorage.setItem("patient_auth_id", user.id);

    window.location.href = "patient.html";
  }
}
</script>

</body>
</html>
