<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIQ | AI Healthcare</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* Background Image */
body {
  background: url('https://blog.voagents.ai/wp-content/uploads/2025/09/ai-medical-scheduling.png') no-repeat center center/cover;
  animation: zoomBg 20s infinite alternate ease-in-out;
}

/* Background Zoom Animation */
@keyframes zoomBg {
  0% { background-size: 100%; }
  100% { background-size: 110%; }
}

/* Dark overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

.float {
  animation: float 4s ease-in-out infinite;
}

/* Glow text */
.glow {
  text-shadow: 0 0 10px rgba(59,130,246,0.8),
               0 0 20px rgba(59,130,246,0.6),
               0 0 30px rgba(59,130,246,0.4);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen text-white">

<!-- Overlay -->
<div class="overlay"></div>

<!-- 🔥 Login Card -->
<div class="relative w-96 bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.7)] p-8 float">

    <!-- Glow border -->
    <div class="absolute -inset-1 bg-gradient-to-r from-blue-500 to-indigo-600 blur opacity-30 rounded-2xl"></div>

    <div class="relative">

        <!-- Logo -->
        <h1 class="text-4xl font-extrabold text-center glow mb-2">MEDIQ</h1>

        <!-- Typing Text -->
        <p id="typing" class="text-center text-gray-200 mb-6 h-6"></p>

        <!-- Features -->
        <div class="bg-white/10 border border-white/20 rounded-lg p-3 mb-5 text-sm text-gray-200">
            🚀 Smart Scheduling <br>
            🤖 AI Doctor Matching <br>
            ⏱ Zero Waiting Time
        </div>

        <!-- Username -->
        <input 
            type="text" 
            id="username" 
            placeholder="Enter your name"
            class="w-full px-4 py-2 mb-4 bg-white/20 border border-white/30 rounded-lg placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
        <input 
  type="email" 
  id="email" 
  placeholder="Enter your email"
  class="w-full px-4 py-2 mb-4 bg-white/20 border border-white/30 rounded-lg placeholder-gray-300"
/>

        <!-- Role -->
        <select 
            id="role"
            class="w-full px-4 py-2 mb-6 bg-white/20 border border-white/30 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
            <option value="patient" class="text-black">Patient</option>
            <option value="doctor" class="text-black">Doctor</option>
        </select>

        <!-- Button -->
        <button 
            onclick="login()"
            class="w-full bg-blue-500 hover:bg-blue-600 transition duration-300 py-2 rounded-lg font-semibold shadow-lg"
        >
            Enter MEDIQ →
        </button>

    </div>
</div>

<script>
  const supabaseUrl = 'https://gxuwfjlwcgnjnwegzamd.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dXdmamx3Y2duam53ZWd6YW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzcxNTYsImV4cCI6MjA5MDQ1MzE1Nn0.RPHbDA1YS6z6yTXST_IgKF4c9A9BkY8iqyo4WqfaYAA';
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const name = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const role = document.getElementById("role").value;

  if (!name || !email) {
    alert("Enter name and email");
    return;
  }

  localStorage.setItem("username", name);
  localStorage.setItem("role", role);

  if (role === "doctor") {

    const { data, error } = await supabaseClient
      .from('doctors')
      .select('*')
      .eq('email', email)
      .single();

    if (error || !data) {
      alert("Doctor not found with this email");
      return;
    }

    // ✅ STORE REAL DOCTOR ID
    localStorage.setItem("doctor_id", data.id);

    window.location.href = "doctor.html";

  } else {
    window.location.href = "patient.html";
  }
}

typeEffect();
</script>

</body>
</html>
